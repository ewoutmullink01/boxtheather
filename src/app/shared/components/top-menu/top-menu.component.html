<header class="top-menu">
  <a class="brand" routerLink="/home" aria-label="Ga naar Home">
    <svg
      class="brand__icon"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <rect x="2" y="4" width="20" height="16" rx="4" stroke="currentColor" stroke-width="2" />
      <circle cx="8" cy="12" r="1.6" fill="currentColor" />
      <circle cx="16" cy="12" r="1.6" fill="currentColor" />
      <path d="M4 8H20" stroke="currentColor" stroke-width="2" />
      <path d="M4 16H20" stroke="currentColor" stroke-width="2" />
    </svg>

    <span class="brand__text">BoxTheater</span>
  </a>

  <nav class="navigation" aria-label="Hoofdmenu">
    <ul class="navigation__list">
      @for (item of navigationItems; track item.path) {
        <li>
          <a
            class="navigation__link"
            [routerLink]="item.path"
            routerLinkActive="navigation__link--active"
            [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
          >
            {{ item.label }}
          </a>
        </li>
      }
    </ul>
  </nav>
</header>
