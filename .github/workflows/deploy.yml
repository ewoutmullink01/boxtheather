name: Deploy to Server

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            APP_DIR=/root/boxtheather
            DEPLOY_DIR="$APP_DIR/boxtheatherFrontend"
            REPO_SSH=git@github.com-boxtheather:ewoutmullink01/boxtheather.git

            mkdir -p /root/.ssh
            chmod 700 /root/.ssh
            ssh-keyscan github.com >> /root/.ssh/known_hosts
            chmod 600 /root/.ssh/known_hosts

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_SSH" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_SSH"
            git fetch origin master
            git reset --hard origin/master

            cd "$DEPLOY_DIR"
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker rm -f boxtheather-gateway boxtheather-frontend beheerportaal-frontend boxtheather-backend 2>/dev/null || true
            attempt=1
            max_attempts=3
            until docker compose -f docker-compose.prod.yml up --build -d; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "docker compose up failed after ${max_attempts} attempts"
                exit 1
              fi
              echo "docker compose up failed (attempt ${attempt}/${max_attempts}), retrying in 20s..."
              attempt=$((attempt + 1))
              sleep 20
            done

            docker image prune -f
